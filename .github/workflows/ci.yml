name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --legacy-peer-deps
      # No lint script in package.json yet — this job is a placeholder.
      # When a linter is added (ESLint / Biome), wire it here via
      # `npm run lint`. Until then, fail open so the workflow doesn't
      # block PRs during early template setup.
      - name: Run linter (no-op until configured)
        run: npm run lint --if-present || echo "lint: no linter configured yet"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      # CI-only placeholder secrets. Real secrets are injected via
      # Vercel project env vars in deploy. These just have to satisfy
      # better-auth's ≥32-char schema validation at build time.
      BETTER_AUTH_SECRET: ci-test-secret-which-is-long-enough-to-pass-the-32-char-validation
      MINIMAX_API_KEY: ci-placeholder-not-used-during-build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npm run build

  test-unit:
    name: Test (Unit)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      BETTER_AUTH_SECRET: ci-test-secret-which-is-long-enough-to-pass-the-32-char-validation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --legacy-peer-deps
      # No test runner in this template yet. When tests are added
      # (Vitest / Jest), wire `npm test` here. For now: no-op.
      - name: Run unit tests (no-op until test runner added)
        run: npm test --if-present || echo "test-unit: no test runner configured"

  test-integration:
    name: Test (Integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      BETTER_AUTH_SECRET: ci-test-secret-which-is-long-enough-to-pass-the-32-char-validation
      DATABASE_URL: postgresql://test:test@localhost:5432/test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Apply migrations
        # Idempotent — drizzle-kit migrate is safe to re-run; for a CI
        # test DB we want a clean schema per run, so we could also
        # `drizzle-kit drop` here if the test runner doesn't isolate.
        run: npx drizzle-kit migrate

      - name: Run integration tests
        # Same placeholder pattern as test-unit. Wire `npm test
        # -- --run integration` or similar once integration tests
        # exist.
        run: npm test --if-present || echo "test-integration: no test runner configured"
