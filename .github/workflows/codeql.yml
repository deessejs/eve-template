"name": "CodeQL"

"on":
  push:
    branches:
      - "main"
      - "staging"
  pull_request:
    branches:
      - "main"
      - "staging"
  schedule:
    - cron: "17 6 * * 1"

"jobs":
  "analyze":
    "runs-on": "ubuntu-latest"
    "permissions":
      "actions": "read"
      "contents": "read"
      "security-events": "write"
    "strategy":
      "fail-fast": false
      "matrix":
        "language":
          - "typescript"
    "steps":
      - "uses": "actions/checkout@v4"
      - "uses": "github/codeql-action/init@v3"
        "with":
          "languages": "${{ matrix.language }}"
          "queries": "security-extended"
          "paths-ignore": |
            .next
            node_modules
            .eve
            .claude
            tests
            docs
      - "uses": "github/codeql-action/analyze@v3"
        "with":
          "category": "/language:${{ matrix.language }}"