version: 2
updates:
  # ─── npm ────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      production:
        dependency-type: production
        update-types: [minor, patch]
      development:
        dependency-type: development
        update-types: [minor, patch]
      # Better-auth is on a Release Candidate; eve is on 0.x.
      # Both can carry breaking changes on a non-major bump; isolate
      # them from the main groups so reviewers pay attention.
      breaking-track:
        dependency-name: ["better-auth", "eve"]
        update-types: [major, minor]
    ignore:
      # TypeScript major bumps change `tsconfig` recommendations and
      # package.json#engines — handle them by hand.
      - dependency-name: "typescript"
        update-types: [version-update:semver-major]

  # ─── GitHub Actions ─────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]